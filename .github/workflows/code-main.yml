name: "Quality Check"

on:
  push:
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm

      - name: Runs Prettier Check
        run: npx prettier -c .

      - name: Runs tslint Check
        run: npx eslint src/
      - name: Run Test
        run: npm test
